name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run tests
        run: pytest -q

      - name: Create Maven-style zip
        run: |
          version="${GITHUB_REF_NAME:-ci}"
          artifact_dir="$GITHUB_WORKSPACE/target/de-utility/${version}"
          mkdir -p "$artifact_dir/src"
          git archive --format=tar HEAD | tar -x -C "$artifact_dir/src"
          cd "$artifact_dir"
          zip -r "$GITHUB_WORKSPACE/de-utility-${version}.zip" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: de-utility-ci-artifact
          path: target/
