name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to release'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Validate release tag
        run: |
          tag_name="${{ github.event.inputs.release_tag || github.ref_name }}"
          echo "Resolved release tag: $tag_name"
          if ! grep -Fxq "$tag_name" .github/release-tags.txt; then
            echo "Tag $tag_name is not an allowed release tag"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run tests
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Validate release tag
        run: |
          tag_name="${{ github.event.inputs.release_tag || github.ref_name }}"
          echo "Resolved release tag: $tag_name"
          if ! grep -Fxq "$tag_name" .github/release-tags.txt; then
            echo "Tag $tag_name is not an allowed release tag"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Create Maven-style zip
        run: |
          version="${{ github.event.inputs.release_tag || github.ref_name }}"
          artifact_dir="$GITHUB_WORKSPACE/target/de-utility/${version}"
          mkdir -p "$artifact_dir/src" "$GITHUB_WORKSPACE/release-artifacts"
          git archive --format=tar "$version" | tar -x -C "$artifact_dir/src"
          cd "$artifact_dir"
          zip -r "$GITHUB_WORKSPACE/de-utility-${version}.zip" .
          cp "$GITHUB_WORKSPACE/de-utility-${version}.zip" "$GITHUB_WORKSPACE/release-artifacts/de-utility-${version}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: de-utility-dist
          path: |
            dist/
            release-artifacts/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: de-utility-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
