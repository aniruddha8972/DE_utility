name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run tests
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Create Maven-style zip
        run: |
          version="${GITHUB_REF_NAME}"
          artifact_dir="target/de-utility/${version}"
          mkdir -p "$artifact_dir/src" release-artifacts
          git archive --format=tar "$GITHUB_REF_NAME" | tar -x -C "$artifact_dir/src"
          cd "$artifact_dir"
          zip -r "../../de-utility-${version}.zip" .
          cp "../../de-utility-${version}.zip" "release-artifacts/de-utility-${version}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: de-utility-dist
          path: |
            dist/
            release-artifacts/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: de-utility-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
